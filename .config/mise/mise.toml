# https://mise.jdx.dev/dev-tools/

# https://mise.jdx.dev/configuration/settings.html
[settings]
experimental = true
quiet = false
disable_backends = [
    "asdf",
    "cargo",
    "conda",
    "dotnet",
    "forgejo",
    "gem",
    "spm",
    "ubi",
    "vfox",
]
lockfile = true
# yes = true

# https://mise.jdx.dev/dev-tools/backends/
# https://mise.jdx.dev/dev-tools/backends/go.html
# https://mise.jdx.dev/dev-tools/backends/github.html
# https://mise.jdx.dev/dev-tools/backends/npm.html
# https://mise.jdx.dev/dev-tools/backends/pipx.html
[tools]
go = "latest"
node = "latest"
pipx = "latest"

"github:kaaveland/eugene" = "latest"
"github:sharkdp/fd" = { version = "latest", bin = "fdfind" }
"github:AGWA/git-crypt" = "latest"
"github:git-lfs/git-lfs" = "latest"
"github:golangci/golangci-lint" = "latest"
"github:danielrobbins/keychain" = "latest"
"github:LuaLS/lua-language-server" = "latest"
"github:artempyanykh/marksman" = "latest"
"github:neovim/neovim" = "nightly"
"github:BurntSushi/ripgrep" = "latest"
"github:koalaman/shellcheck" = "latest"
"github:anordal/shellharden" = "latest"
"github:JohnnyMorganz/StyLua" = "latest"
"github:crate-ci/typos" = "latest"

"go:golang.org/x/tools/gopls" = "latest"
"go:mvdan.cc/sh/v3/cmd/shfmt" = "latest"
"go:github.com/a-h/templ/cmd/templ" = "latest"

"npm:bash-language-server" = "latest"
"npm:dprint" = "latest"
"npm:markdownlint-cli2" = "latest"
"npm:perlnavigator-server" = "latest"
"npm:prettier" = "latest"
"npm:tree-sitter-cli" = "latest"
"npm:vim-language-server" = "latest"

"pipx:sqlfluff" = "latest"
"pipx:vim-vint" = "latest"
"pipx:yamllint" = "latest"
